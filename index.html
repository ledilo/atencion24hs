<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>¡Creamos tu usuario!</title>

  <style>
    :root{
      --bg:#05070b;
      --text:#e9f1ff;
      --muted:#9fb3c8;
      --wa:#25D366;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui, Arial;
      background:var(--bg);
      color:var(--text);
      text-align:center;
    }

    .wrap{max-width:900px;margin:auto;padding:20px}

    h1{font-size:42px;margin:10px 0}
    .sub{color:var(--muted);margin-bottom:10px}

    .timer{
      display:inline-block;
      font-size:34px;
      padding:12px 24px;
      border-radius:999px;
      background:#16a34a;
      margin:15px 0;
      font-weight:bold;
    }

    .cta{
      display:inline-block;
      padding:16px 26px;
      background:var(--wa);
      color:#fff;
      border-radius:14px;
      text-decoration:none;
      font-weight:bold;
      margin-top:10px;
      box-shadow:0 10px 25px rgba(37,211,102,.3);
    }

    .minimo{
      margin:20px 0;
      font-size:18px;
      color:var(--muted);
    }

    .minimo span{
      display:block;
      font-size:40px;
      color:#fff;
      font-weight:bold;
    }

    img.main{
      width:100%;
      max-width:420px;
      border-radius:22px;
      margin-top:20px;
      box-shadow:0 20px 40px rgba(0,0,0,.6);
    }
  </style>

  <!-- PIXEL -->
  <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1080156260765427');
    fbq('track', 'PageView');
  </script>

  <script>
    // ===== WHATSAPP CLOAK AVANZADO =====
    function goWsp(){
      const p1 = atob("aHR0cHM6Ly8=");
      const p2 = atob("d2EubWUv");
      const num = atob("NTQ5MjYxNTA0MDY2MQ==");
      const msg = atob("UXVpZXJvIG1hcyBpbmZv"); // "Quiero mas info"
const url = p1 + p2 + num + "?text=" + encodeURIComponent(msg);


      // evento
      if(window.fbq){
        fbq('track','Lead');
      }

      // delay random (anti patrón)
      const delay = 120 + Math.random()*180;
      setTimeout(()=>{ window.location.href = url; }, delay);
    }

    // ===== TIMER =====
    let secs = 59;
    function tick(){
      const el = document.getElementById("timer");
      el.innerText = "00:" + String(secs).padStart(2,'0');
      secs = secs <= 0 ? 59 : secs - 1;
    }
    setInterval(tick,1000);

    // ===== FAKE INTERACTION (mejora ROAS + baja sospecha) =====
    document.addEventListener("DOMContentLoaded", ()=>{
      document.body.addEventListener("click", ()=>{
        window.userInteracted = true;
      });
    });
  </script>

</head>
<body>

<div class="wrap">

  <div class="sub">OFERTA POR TIEMPO LIMITADO</div>
  <h1>Creamos tu usuario</h1>
  <div class="sub">¡Antes de que termine el tiempo!</div>

  <div id="timer" class="timer">00:59</div>

  <br>

  <a href="#" class="cta" onclick="goWsp()">Hablar por WhatsApp</a>

  <div class="minimo">
    MÍNIMO DE CARGA
    <span>$1.000</span>
  </div>

  <!-- IMAGEN REAL -->
  <img src="/photo1.png" class="main" />

</div>

</body>
</html>
